<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calciominchiato LIVE - Generatore Notizie</title>
    <style>
        /* Stile generale ispirato ai siti sportivi (Gazzetta, Sky Sport) */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 30px;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            color: #e2001a; /* Rosso sportivo dinamico */
            text-transform: uppercase;
            font-size: 2rem;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Pulsante stile "Breaking News" */
        #btn-genera {
            background-color: #002f6c; /* Blu notte sport */
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,47,108,0.2);
        }

        #btn-genera:hover {
            background-color: #e2001a;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(226,0,26,0.3);
        }

        #btn-genera:active {
            transform: translateY(0);
        }

        /* Box della notizia generata */
        #news-box {
            margin-top: 30px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-left: 5px solid #e2001a;
            background-color: #fdfdfd;
            padding: 20px;
            border-radius: 4px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #news-box.show {
            opacity: 1;
        }

        /* Badge "ULTIM'ORA" */
        .badge {
            background-color: #e2001a;
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 4px 8px;
            text-transform: uppercase;
            border-radius: 3px;
            margin-bottom: 15px;
            letter-spacing: 1px;
            display: inline-block;
        }

        /* Il titolo della notizia vero e proprio */
        .news-text {
            font-size: 1.4rem;
            font-weight: 800;
            color: #111;
            line-height: 1.3;
            text-transform: uppercase; /* Tipico dei titoloni sportivi */
        }

        /* Evidenziazione per i nomi delle squadre o dei giocatori */
        .highlight {
            color: #002f6c;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Calciominchiato LIVE</h1>
        <div class="subtitle">Generatore di Notizie di Calciominchiato in Tempo Reale</div>
        <h2>Affidabile tanto quanto i siti di news ufficiali (forse di più)</h2>
        
        <button id="btn-genera">Genera News</button>

        <div id="news-box">
            <span class="badge">Ultim'ora</span>
            <div id="news-content" class="news-text">
                Clicca sul pulsante per scoprire l'ultima bomba di mercato!
            </div>
        </div>
    </div>

    <script>
        // Definizione dei 3 archivi di dati (JSON/Array)
        const squadre = [
            "Atalanta", "Bologna", "Cagliari", "Como", "Fiorentina", 
            "Frosinone", "Genoa", "Inter", "Juventus", "Lazio", 
            "Lecce", "Milan", "Monza", "Napoli", "Parma", 
            "Roma", "Sassuolo", "Torino", "Udinese", "Venezia"
        ];
        
        const giocatori = [
            "Magnanelli", "Vlahovic", "Palestra", "Rudiger", "Muharemovic", 
            "Manu Kone", "Ismael Kone", "Pellegrini", "Gila", "Nico Paz", 
            "Celik", "Keita", "Vicario", "Provedel", "Solet", 
            "Mancini", "Ruben Dias", "Foden", "Bernardo Silva", "Alaba", 
            "Ryan Flamingo", "Bremer", "El Shaarawy", "Cambiaso", "Suzuki", 
            "Konate I.", "N'dicka", "Ordonez", "Ederson", "Goretzka", 
            "Dibu Martinez", "Carvajal", "Mamardashvili", "Kepa", "Svilar", 
            "Dodo", "Ndoye", "Munoz", "Atta", "Rovella", 
            "Lewis Ferguson", "Fagioli", "Mandragora", "Meret", "Alajbegovic", 
            "Lauriente", "Ruggeri", "Veerman", "Endrick", "Mastantuono", 
            "Malo Gusto", "Curtis Jones", "Rodrygo", "Arda Guler", "Brahim Diaz", "Kubo"
        ];
        
        // Frasi rimodellate con il doppio placeholder {squadra} e {giocatore}
        const azioni = [
            "Pista calda per la {squadra} su {giocatore}: l'accordo è vicino",
            "Si raffredda la pista {squadra} per {giocatore}: inserimento a sorpresa di un club inglese",
            "Tentativo lampo della {squadra} per {giocatore}: offerta ufficiale presentata",
            "È fatta per l'arrivo di {giocatore} alla {squadra}: visite mediche programmate",
            "Frena la trattativa tra la {squadra} e {giocatore}: ballano 5 milioni sui bonus",
            "Assalto totale della {squadra} a {giocatore}: l'agente è in sede",
            "Beffa vicina per la {squadra} su {giocatore}: il giocatore preferisce un'altra destinazione",
            "Muro contro muro tra la {squadra} e {giocatore}: la richiesta del club è considerata troppo alta",
            "La {squadra} lavora su {giocatore}, ma c'è un nodo legato alle commissioni",
            "Filtra ottimismo in casa {squadra} per {giocatore}: si chiude la quadra con l'agente",
            "Filtra cauto ottimismo tra la {squadra} e l'entourage di {giocatore} dopo l'ultimo incontro",
            "Si accende la pista {squadra} per {giocatore}: accelerata decisiva della dirigenza",
            "Brusca frenata della {squadra} per {giocatore}: inserimento a sorpresa di una rivale",
            "Tutto pronto in casa {squadra} per l'arrivo di {giocatore}: attesa la firma entro 48 ore",
            "{giocatore} alla {squadra}? Il procuratore lancia un indizio social ed è appena atterrato a Milano",
            "Clamoroso retroscena su {giocatore}: la {squadra} ha effettuato un inserimento nella notte",
            "Scatto decisivo della {squadra} per {giocatore}: l'accordo sui diritti d'immagine è totale",
            "Il mister della {squadra} striglia la società: vuole subito {giocatore} per il ritiro",
            "Suggestione {giocatore} per la {squadra}: il presidente ci prova con un volo privato in segreto",
            "Autentico blitz a sorpresa della {squadra} per {giocatore}: fumata bianca vicinissima",
            "Giallo {giocatore}: non si allena con la squadra, spinge per andare alla {squadra}",
            "Idea low-cost per l'attacco della {squadra}: spunta il nome dello svincolato {giocatore}",
            "Scambio dell'anno all'orizzonte: la {squadra} offre {giocatore} come contropartita tecnica",
            "Principio di accordo tra la {squadra} e {giocatore}: pronto un contratto di 4 anni"
        ];

        // Funzione per estrarre un elemento casuale da un array
        function getRandomElement(array) {
            const randomIndex = Math.floor(Math.random() * array.length);
            return array[randomIndex];
        }

        // Funzione principale che genera la notizia
        function generaNews() {
            // 1. Estrazione dei tre pezzi random
            const squadraScelta = getRandomElement(squadre);
            const giocatoreScelto = getRandomElement(giocatori);
            const azioneScelta = getRandomElement(azioni);

            // 2. Prepariamo le versioni evidenziate (avvolte nel tag span con classe highlight)
            const squadraEvidenziata = `<span class="highlight">${squadraScelta}</span>`;
            const giocatoreEvidenziato = `<span class="highlight">${giocatoreScelto}</span>`;

            // 3. Logica di composizione: sostituisco i segnaposto con le versioni evidenziate
            let notiziaFinale = azioneScelta
                .replace(/{giocatore}/g, giocatoreEvidenziato)
                .replace(/{squadra}/g, squadraEvidenziata);

            // 4. Aggiornamento del DOM con effetto transizione
            const newsBox = document.getElementById('news-box');
            const newsContent = document.getElementById('news-content');

            // Nascondiamo un attimo il box per l'effetto cambio
            newsBox.classList.remove('show');

            setTimeout(() => {
                newsContent.innerHTML = notiziaFinale;
                newsBox.classList.add('show');
            }, 150); 
        }

        // Collegiamo la funzione al click del pulsante
        document.getElementById('btn-genera').addEventListener('click', generaNews);
    </script>

</body>
</html>
