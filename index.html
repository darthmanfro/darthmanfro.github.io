<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calciominchiato LIVE - Generatore Notizie</title>
    <style>
        /* Stile generale ispirato ai siti sportivi (Gazzetta, Sky Sport) */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 30px;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            color: #e2001a; /* Rosso sportivo dinamico */
            text-transform: uppercase;
            font-size: 2rem;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Pulsante stile "Breaking News" */
        #btn-genera {
            background-color: #002f6c; /* Blu notte sport */
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,47,108,0.2);
            margin-bottom: 20px;
        }

        #btn-genera:hover {
            background-color: #e2001a;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(226,0,26,0.3);
        }

        #btn-genera:active {
            transform: translateY(0);
        }

        /* Contenitore della lista di notizie */
        #news-container {
            width: 100%;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Box della singola notizia generata */
        .news-box {
            text-align: left;
            border-left: 5px solid #e2001a;
            background-color: #fdfdfd;
            padding: 0px 20px; /* Parte da 0 per l'animazione fluida */
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transform: translateY(-10px);
            /* Transizione estesa per gestire anche la scomparsa fluida dello spazio occupato dal box */
            transition: opacity 0.4s ease, transform 0.4s ease, max-height 0.4s ease, padding 0.4s ease;
        }

        /* Stato per l'animazione di comparsa */
        .news-box.show {
            opacity: 1;
            max-height: 200px; /* Altezza massima stimata per contenere il testo */
            padding: 20px;
            transform: translateY(0);
        }

        /* Badge "ULTIM'ORA" */
        .badge {
            background-color: #e2001a;
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 4px 8px;
            text-transform: uppercase;
            border-radius: 3px;
            margin-bottom: 10px;
            letter-spacing: 1px;
            display: inline-block;
        }

        /* Il titolo della notizia vero e proprio */
        .news-text {
            font-size: 1.3rem;
            font-weight: 800;
            color: #111;
            line-height: 1.3;
            text-transform: uppercase; /* Tipico dei titoloni sportivi */
        }

        /* Evidenziazione per i nomi delle squadre o dei giocatori */
        .highlight {
            color: #002f6c;
        }
    </style>
</head>
<body>

            "{squadra}, spunta una clausola rescissoria nel contratto di {giocatore}: si valuta il pagamento immediato",

            "Vertice fiume nella sede di {squadra}: caldeggiato il profilo di {giocatore} per rinforzare la rosa",

        // Funzione per estrarre un elemento casuale da un array
        function getRandomElement(array) {
            const randomIndex = Math.floor(Math.random() * array.length);
            return array[randomIndex];
        }

        // Funzione principale che genera la notizia e la inserisce in cima alla lista
       function generaNews() {
            const squadraScelta = getRandomElement(squadre);
            const giocatoreScelto = getRandomElement(giocatori);
            const azioneScelta = getRandomElement(azioni);

            const squadraEvidenziata = `<span class="highlight">${squadraScelta}</span>`;
            const giocatoreEvidenziato = `<span class="highlight">${giocatoreScelto}</span>`;

            let notiziaFinale = azioneScelta
                .replace(/{giocatore}/g, giocatoreEvidenziato)
                .replace(/{squadra}/g, squadraEvidenziata);

            const nuovoNewsBox = document.createElement('div');
            nuovoNewsBox.className = 'news-box';
            
            nuovoNewsBox.innerHTML = `
                <span class="badge">Ultim'ora</span>
                <div class="news-text">${notiziaFinale}</div>
            `;

            const newsContainer = document.getElementById('news-container');
            newsContainer.prepend(nuovoNewsBox);

            // 1. Mostra la notizia con effetto transizione
            setTimeout(() => {
                nuovoNewsBox.classList.add('show');
            }, 10);

            // 2. Timer per far sparire la notizia dopo 30 secondi (30000 ms)
            setTimeout(() => {
                // Avvia l'animazione di sparizione rimuovendo la classe
                nuovoNewsBox.classList.remove('show');
                
                // Rimuove fisicamente l'elemento dal DOM al termine dell'animazione (400ms)
                setTimeout(() => {
                    nuovoNewsBox.remove();
                }, 400);
            }, 30000); // Puoi impostare 5000 (5 secondi) se vuoi testarlo subito
        }

        // Collegiamo la funzione al click del pulsante
        document.getElementById('btn-genera').addEventListener('click', generaNews);
